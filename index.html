let state = {
  view: 'dashboard',
  sites: [],
  settings: { companyName:'', companyAddress:'', companyTel:'', licenseNo:'', repName:'', stampText:'' },
  applyWizard: { step:1, cityId:'', type:'', siteId:'' },
  pdfMappings: {},
  selectedSiteId: null,
  formsDeleted: [],   // 削除した書式のファイル名一覧
  formsCustom: {},    // 追加した書式 { 'kumatori_water': [{file,name},...] }
  cityOverrides: {},  // 編集済み市区町村情報 { cityId: {office,waterTel,drainTel} }
};

function saveState() {
  localStorage.setItem('suido_sites', JSON.stringify(state.sites));
  localStorage.setItem('suido_settings', JSON.stringify(state.settings));
  try { localStorage.setItem('suido_pdf_mappings', JSON.stringify(state.pdfMappings)); } catch(e){}
  try { localStorage.setItem('suido_forms_deleted', JSON.stringify(state.formsDeleted)); } catch(e){}
  try { localStorage.setItem('suido_forms_custom', JSON.stringify(state.formsCustom)); } catch(e){}
  try { localStorage.setItem('suido_city_overrides', JSON.stringify(state.cityOverrides)); } catch(e){}
}

function loadState() {
  try {
    const s = localStorage.getItem('suido_sites'); if(s) state.sites = JSON.parse(s);
    const cfg = localStorage.getItem('suido_settings'); if(cfg) state.settings = JSON.parse(cfg);
    const pm = localStorage.getItem('suido_pdf_mappings'); if(pm) state.pdfMappings = JSON.parse(pm);
    const fd = localStorage.getItem('suido_forms_deleted'); if(fd) state.formsDeleted = JSON.parse(fd);
    const fc = localStorage.getItem('suido_forms_custom'); if(fc) state.formsCustom = JSON.parse(fc);
    const co = localStorage.getItem('suido_city_overrides'); if(co) state.cityOverrides = JSON.parse(co);
  } catch(e) { console.warn('Load error', e); }
}

function getCity(id) { return CITIES.find(c=>c.id===id); }
// cityOverridesで上書きされた市区町村情報を返す
function getCityInfo(id) {
  const base = getCity(id); if(!base) return null;
  const ov = state.cityOverrides[id] || {};
  return { ...base, ...ov };
}
function getSite(id) {
  const s = state.sites.find(s=>s.id===id);
  // 旧データにformDataがない場合は初期化
  if(s && !s.formData) {
    s.formData = defaultFormData(s.cityId);
    if(s.owner) s.formData.shinseisha_namae = s.owner;
    if(s.address) s.formData.koji_basho = s.address;
  }
  return s;
}
function getStatus(id) { return STATUS_LIST.find(s=>s.id===id) || STATUS_LIST[0]; }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if(!d) return '-'; const dt=new Date(d); return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; }

// ============================================================
// VIEW RENDERING
// ============================================================
function showView(v) {
  state.view = v;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('tab-active'));
  const tab = document.getElementById('tab-'+v);
  if(tab) tab.classList.add('tab-active');
  const mc = document.getElementById('main-content');
  if(v==='dashboard') mc.innerHTML = renderDashboard();
  else if(v==='sites') mc.innerHTML = renderSites();
  else if(v==='site-detail') mc.innerHTML = renderSiteDetail();
  else if(v==='apply') mc.innerHTML = renderApply();
  else if(v==='cityinfo') mc.innerHTML = renderCityInfo();
  else if(v==='pdftemplates') mc.innerHTML = renderPdfTemplates();
  else if(v==='settings') mc.innerHTML = renderSettings();
}

// ---- DASHBOARD ----
function renderDashboard() {
  const all = state.sites;
  const counts = { total:all.length, active:0, done:0, hold:0, new:0 };
  all.forEach(s=>{
    if(s.status==='done') counts.done++;
    else if(s.status==='hold') counts.hold++;
    else if(s.status==='new') counts.new++;
    else counts.active++;
  });
  const recent = [...all].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,8);
  return `
  <div class="space-y-6">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${card('📋','登録現場数',counts.total,'現場','blue')}
      ${card('🔄','申請・工事中',counts.active,'現場','orange')}
      ${card('✅','竣工完了',counts.done,'現場','green')}
      ${card('⏸','保留',counts.hold,'現場','red')}
    </div>
    <!-- Recent Sites -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg text-gray-800">最近の現場</h2>
        <button onclick="showView('sites')" class="text-blue-600 text-sm hover:underline">すべて表示 →</button>
      </div>
      ${recent.length===0 ? '<p class="text-gray-400 text-center py-8">現場が登録されていません。<br>右上の「＋ 新規現場登録」からはじめましょう。</p>' :
      `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left border-b text-gray-500">
          <th class="pb-2 pr-4">現場名</th><th class="pb-2 pr-4">住所</th><th class="pb-2 pr-4">市区町村</th><th class="pb-2 pr-4">工事種別</th><th class="pb-2 pr-4">ステータス</th><th class="pb-2">更新日</th>
        </tr></thead><tbody>
        ${recent.map(s=>{
          const st=getStatus(s.status); const city=getCity(s.cityId);
          return `<tr class="border-b hover:bg-gray-50 cursor-pointer" onclick="openSite('${s.id}')">
            <td class="py-2 pr-4 font-medium text-blue-700">${s.name}</td>
            <td class="py-2 pr-4 text-gray-600 max-w-xs truncate">${s.address||'-'}</td>
            <td class="py-2 pr-4">${city?city.name:'-'}</td>
            <td class="py-2 pr-4 text-gray-600">${s.workType||'-'}</td>
            <td class="py-2 pr-4"><span class="status-badge ${st.color}">${st.label}</span></td>
            <td class="py-2 text-gray-500">${fmtDate(s.updatedAt)}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>`}

    <!-- Quick Actions -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
        <h3 class="font-bold text-gray-800 mb-2">📝 申請書を作成する</h3>
        <p class="text-sm text-gray-500 mb-3">市区町村と工事種別を選んで必要書類を確認・作成</p>
        <button onclick="showView('apply')" class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700">申請書作成へ</button>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
        <h3 class="font-bold text-gray-800 mb-2">📂 PDF書式管理</h3>
        <p class="text-sm text-gray-500 mb-3">市区町村別の申請書式PDFを管理・印刷</p>
        <button onclick="showView('pdftemplates')" class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700">PDF書式管理へ</button>

      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">

function card(icon,label,val,unit,color) {
  const colors={blue:'bg-blue-50 text-blue-600 border-blue-200',orange:'bg-orange-50 text-orange-600 border-orange-200',green:'bg-green-50 text-green-600 border-green-200',red:'bg-red-50 text-red-600 border-red-200'};
  return `<div class="bg-white rounded-xl shadow-sm p-5 border ${colors[color]}">
    <div class="text-2xl mb-1">${icon}</div>
    <div class="text-3xl font-bold ${colors[color].split(' ')[1]}">${val}</div>
    <div class="text-sm text-gray-500">${label}（${unit}）</div>
  </div>`;
}

// ---- SITES LIST ----
function renderSites() {
  const filterStatus = window._filterStatus || '';

  const filterText = window._filterText || '';
  let sites = [...state.sites];
  if(filterStatus) sites = sites.filter(s=>s.status===filterStatus);
  if(filterCity) sites = sites.filter(s=>s.cityId===filterCity);
  if(filterText) sites = sites.filter(s=>(s.name+s.address+s.owner).toLowerCase().includes(filterText.toLowerCase()));
  sites.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  return `
  <div class="space-y-4">
    <div class="bg-white rounded-xl shadow-sm p-4 flex flex-wrap gap-3 items-center">
      <input type="text" placeholder="現場名・住所で検索..." value="${filterText}" oninput="window._filterText=this.value;showView('sites')" class="border rounded-lg px-3 py-2 text-sm flex-1 min-w-40">
      <select onchange="window._filterCity=this.value;showView('sites')" class="border rounded-lg px-3 py-2 text-sm">

            <td class="px-4 py-3 font-medium text-blue-700 cursor-pointer hover:underline" onclick="openSite('${s.id}')">${s.name}</td>

// ---- 熊取町 Excelテンプレート自動入力 ----
async function generateKumatoriExcel(siteId) {
  const site = getSite(siteId);
  if(!site) return;
  const fd = site.formData || defaultFormData(site.cityId);
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '⏳ 処理中...'; btn.disabled = true;

  try {
    const resp = await fetch('forms/templates/熊取町_template.xlsx');
    if(!resp.ok) throw new Error('テンプレートファイルが見つかりません');
    const arrayBuf = await resp.arrayBuffer();
    const wb = XLSX.read(arrayBuf, {type:'array', cellStyles:true, cellFormulas:true});

    const ws = wb.Sheets['共通項目入力シート'];
    if(!ws) throw new Error('共通項目入力シートが見つかりません');

    // セルに値をセット（F列 = 6列目）
    const set = (addr, val) => {
      if(!ws[addr]) ws[addr] = {};
      ws[addr].v = val; ws[addr].w = String(val); ws[addr].t = 's';
    };
    set('F5',  fd.shinseisha_jusho || '');
    set('F6',  fd.shinseisha_namae || '');
    set('F7',  fd.shinseisha_kana  || '');
    set('F8',  fd.shinseisha_daihyo || '');
    set('F9',  fd.shinseisha_daihyo_kana || '');
    set('F10', fd.shinseisha_tel   || '');
    set('F12', fd.koji_basho       || site.address || '');
    set('F14', fd.shitei_no        || '138');
    set('F15', fd.kaisha_jusho     || '岸和田市三田町1849');
    set('F16', fd.kaisha_namae     || '永野設備工業株式会社');
    set('F17', fd.kaisha_daihyo    || '代表取締役　永野　祥司');
    set('F18', fd.kaisha_tel       || '072-445-1290');
    set('F20', fd.gino_kofu        || '66822');
    set('F21', fd.gino_namae       || '永野　祥司');

    // ダウンロード
    const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
    const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = site.name.replace(/[\/\\:*?"<>|]/g,'_');
    a.download = `熊取町_申請書_${safeName}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = '✅ ダウンロード完了'; btn.disabled = false;
    setTimeout(() => { btn.textContent = orig; }, 3000);
  } catch(e) {
    alert('Excelの生成に失敗しました: ' + e.message);
    btn.textContent = orig; btn.disabled = false;
  }
}

function _collectCityEditTab() {
  const s = _cityEditState; if(!s) return;
  if(s.tab==='contact') {
    ['office','waterOffice','waterTel','drainOffice','drainTel','roadOffice','roadTel'].forEach(k=>{
      const el = document.getElementById('ec_'+k); if(el) s[k] = el.value.trim();
    });
  } else if(s.tab==='flow') {
    const flow = []; let i = 0;
    while(document.getElementById(`fl_title_${i}`)) {
      flow.push({ step:i+1, title:document.getElementById(`fl_title_${i}`).value.trim(),
        desc:document.getElementById(`fl_desc_${i}`).value.trim(),
        days:document.getElementById(`fl_days_${i}`).value.trim() });
      i++;
    }
    s.flow = flow;
  } else if(s.tab==='docs') {
    const keys = Object.keys(s.docs);
    keys.forEach((type,i) => {
      const ta = document.getElementById('docs_'+i);
      if(ta) s.docs[type] = ta.value.split('\n').map(l=>l.trim()).filter(Boolean);
    });
  } else if(s.tab==='fees') {
    const fees = []; let i = 0;
    while(document.getElementById(`fee_name_${i}`)) {
      const name = document.getElementById(`fee_name_${i}`).value.trim();
      const note = document.getElementById(`fee_note_${i}`).value.trim();
      const typeEl = document.getElementById(`fee_type_${i}`);
      const rowsEl = document.getElementById(`fee_rows_${i}`);
      if(typeEl && typeEl.value==='rows' && rowsEl) {
        const rows = rowsEl.value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>l.split('｜'));
        if(name) fees.push({name, rows, note});
      } else {
        const amount = document.getElementById(`fee_amount_${i}`).value.trim();
        if(name) fees.push({name, amount, note});
      }
      i++;
    }
    s.fees = fees;
  }
}

function switchCityEditTab(tab) {
  _collectCityEditTab();
  _cityEditState.tab = tab;
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}

function addCityFlowStep() {
  _collectCityEditTab();
  _cityEditState.flow.push({ step:_cityEditState.flow.length+1, title:'新しいステップ', desc:'', days:'-' });
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}
function removeCityFlowStep(i) {
  _collectCityEditTab();
  _cityEditState.flow.splice(i, 1);
  _cityEditState.flow.forEach((f,idx)=>f.step=idx+1);
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}
function addFeeRow() {
  _collectCityEditTab();
  _cityEditState.fees.push({name:'', amount:'', note:''});
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}
function removeFeeRow(i) {
  _collectCityEditTab();
  _cityEditState.fees.splice(i, 1);
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}
function addCityDocType() {
  _collectCityEditTab();
  const inp = document.getElementById('new_doc_type');
  const type = inp ? inp.value.trim() : '';
  if(!type) { alert('工事種別名を入力してください'); return; }
  if(_cityEditState.docs[type]) { alert('すでに存在する工事種別です'); return; }
  _cityEditState.docs[type] = [];
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}
function removeCityDocType(i) {
  _collectCityEditTab();
  const type = Object.keys(_cityEditState.docs)[i];
  if(!type) return;
  if(!confirm(`「${type}」を削除しますか？`)) return;
  delete _cityEditState.docs[type];
  document.getElementById('city-edit-content').innerHTML = _renderCityEditTab(_cityEditState);
}

function saveCityEditAll() {
  if(!_cityEditState) return;
  _collectCityEditTab();
  const s = _cityEditState;
  state.cityOverrides[s.cityId] = {
    office: s.office, waterOffice: s.waterOffice, waterTel: s.waterTel,
    drainOffice: s.drainOffice, drainTel: s.drainTel,
    roadOffice: s.roadOffice, roadTel: s.roadTel,
    flow: s.flow, fees: s.fees, docs: s.docs, types: Object.keys(s.docs),
  };
  saveState(); closeModal(); showView('cityinfo');
}

  delete state.cityOverrides[cityId];
  saveState(); showView('cityinfo');
}

function createSite() {
  const name = document.getElementById('f_name').value.trim();
  if(!name) { alert('現場名は必須です'); return; }
  const cityId = document.getElementById('f_city').value;
  const owner = document.getElementById('f_owner').value;
  const address = document.getElementById('f_address').value;
  const fd = defaultFormData(cityId);
  // 申込者・工事場所を現場情報から自動設定
  if(owner) { fd.shinseisha_namae = owner; }
  if(address) { fd.koji_basho = address; }
  const site = {
    id:genId(), name, address,
    cityId, workType:document.getElementById('f_type').value,
    owner, person:document.getElementById('f_person').value,
    appDate:document.getElementById('f_appdate').value, dueDate:document.getElementById('f_duedate').value,
    status:document.getElementById('f_status').value, diameter:document.getElementById('f_diameter').value,
    memo:document.getElementById('f_memo').value, currentStep:0, checkedDocs:{}, history:[],
    formData: fd, updatedAt: new Date().toISOString()
  };
  state.sites.push(site); saveState(); closeModal();
  openSite(site.id);
}

function updateSite(id) {
  const name = document.getElementById('f_name').value.trim();
  if(!name) { alert('現場名は必須です'); return; }
  const site = getSite(id);
  if(!site) return;
  Object.assign(site, {
    name, address:document.getElementById('f_address').value,
    cityId:document.getElementById('f_city').value, workType:document.getElementById('f_type').value,
    owner:document.getElementById('f_owner').value, person:document.getElementById('f_person').value,
    appDate:document.getElementById('f_appdate').value, dueDate:document.getElementById('f_duedate').value,
    status:document.getElementById('f_status').value, diameter:document.getElementById('f_diameter').value,
    memo:document.getElementById('f_memo').value, updatedAt:new Date().toISOString()
  });
  saveState(); closeModal(); showView('site-detail');
}

function openSite(id) { state.selectedSiteId=id; showView('site-detail'); }

function updateSiteStatus(id, status) {
  const site = getSite(id); if(!site) return;
  const oldSt = getStatus(site.status);
  site.status = status; site.updatedAt = new Date().toISOString();
  site.history = site.history||[];
  site.history.unshift({ date: today(), text:`ステータスを「${oldSt.label}」→「${getStatus(status).label}」に変更` });
  saveState(); showView('site-detail');
}

function advanceStep(id, stepIdx) {
  const site = getSite(id); if(!site) return;
  site.currentStep = stepIdx+1; site.updatedAt = new Date().toISOString();
  const city = getCity(site.cityId);
  const stepTitle = city&&city.flow[stepIdx] ? city.flow[stepIdx].title : `ステップ${stepIdx+1}`;
  site.history = site.history||[];
  site.history.unshift({ date: today(), text:`「${stepTitle}」を完了` });
  saveState(); showView('site-detail');
}

function addNote(id) {
  const inp = document.getElementById('note-input-'+id); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  const site = getSite(id); if(!site) return;
  site.history = site.history||[];
  site.history.unshift({ date: today(), text });
  site.updatedAt = new Date().toISOString();
  saveState(); showView('site-detail');
}

function toggleDoc(siteId, key, checked) {
  const site = getSite(siteId); if(!site) return;
  site.checkedDocs = site.checkedDocs||{};
  site.checkedDocs[key] = checked;
  site.updatedAt = new Date().toISOString();
  saveState();
  // Partial re-render to avoid losing scroll position
  const box = document.querySelector('.form-preview');
}

function getEffectiveForms(key) {
  // FORMS_CATALOGのベース + カスタム追加 - 削除済み
  const base = (FORMS_CATALOG[key] ? [...FORMS_CATALOG[key].forms] : []);
  const custom = state.formsCustom[key] || [];
  const deleted = new Set(state.formsDeleted);
  const all = [...base, ...custom].filter(f => !deleted.has(f.file));
  return all;
}

function deleteForm(file) {
  if(!state.formsDeleted.includes(file)) {
    state.formsDeleted.push(file);
    saveState();
  }
  showView('pdftemplates');
}

function restoreForm(file) {
  state.formsDeleted = state.formsDeleted.filter(f=>f!==file);
  saveState();
}

function permanentDeleteForm(file) {
  // 非表示リストからも削除 + カスタムリストからも削除 + IndexedDBからも削除
  state.formsDeleted = state.formsDeleted.filter(f=>f!==file);
  for(const key of Object.keys(state.formsCustom)) {
    state.formsCustom[key] = state.formsCustom[key].filter(f=>f.file!==file);
  }
  saveState();
  idbDelete(file).catch(()=>{});
}

function permanentDeleteAllHidden() {
  const toDelete = [...state.formsDeleted];
  toDelete.forEach(f => {
    for(const key of Object.keys(state.formsCustom)) {
      state.formsCustom[key] = state.formsCustom[key].filter(e=>e.file!==f);
    }
    idbDelete(f).catch(()=>{});
  });
  state.formsDeleted = [];
  saveState();
}

function showAddFormModal(key) {
  const cat = FORMS_CATALOG[key];
  const label = cat ? `${cat.cityJp}（${cat.sect==='water'?'給水':'排水'}）` : key;
  document.getElementById('modal-content').innerHTML = `
  <div class="space-y-4">
    <h2 class="text-lg font-bold text-gray-800">＋ 書式を追加</h2>
    <p class="text-sm text-gray-500">追加先：<strong>${label}</strong></p>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">書式名（表示名）<span class="text-red-500">*</span></label>
      <input id="add_form_name" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="例）給水装置工事申込書">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">PDFファイル名（forms/フォルダ内のファイル名）<span class="text-red-500">*</span></label>
      <input id="add_form_file" class="w-full border rounded-lg px-3 py-2 text-sm font-mono text-xs" placeholder="例）kumatori_water_xxx.pdf">

function saveAddForm(key) {
  const name = document.getElementById('add_form_name').value.trim();
  const file = document.getElementById('add_form_file').value.trim();
  if(!name || !file) { alert('書式名とファイル名は必須です'); return; }
  if(!state.formsCustom[key]) state.formsCustom[key] = [];
  // 重複チェック
  const allFiles = [...(FORMS_CATALOG[key]?.forms||[]), ...state.formsCustom[key]].map(f=>f.file);
  if(allFiles.includes(file)) { alert('同じファイル名の書式がすでに存在します'); return; }
  state.formsCustom[key].push({file, name, custom:true});
  saveState();
  closeModal();
  showView('pdftemplates');
}

function exportData() {
  const data = { sites: state.sites, settings: state.settings, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `水道申請データ_${today()}.json`; a.click();
}

function importData(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.sites) { state.sites = data.sites; }
      if(data.settings) { state.settings = data.settings; }
      saveState(); alert('インポートが完了しました');
      showView(state.view);
    } catch(err) { alert('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

// ============================================================
// IndexedDB — アップロードされたPDFの保存・取得
// ============================================================
let _idb = null;
function getDB() {
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open('suido_forms_v1', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files');
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror = () => rej(req.error);
  });
}
async function idbSave(name, buf) {
  const db = await getDB();
  return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put(buf,name); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
}
async function idbGet(name) {
  const db = await getDB();
  return new Promise((res,rej)=>{ const tx=db.transaction('files','readonly'); const r=tx.objectStore('files').get(name); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
}
async function idbDelete(name) {
  const db = await getDB();
  return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').delete(name); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
}

async function openForm(file, ev) {
  if(ev) ev.stopPropagation();
  try {
    const buf = await idbGet(file);
    if(buf) {
      const url = URL.createObjectURL(new Blob([buf],{type:'application/pdf'}));
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
      return;
    }
  } catch(e) {}
  // forms/フォルダにフォールバック
  const a = document.createElement('a');
  a.href = 'forms/' + encodeURIComponent(file);
  a.target = '_blank'; a.rel = 'noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function detectFormGroup(filename) {
  const base = filename.toLowerCase().replace(/\.pdf$/i,'');
  const cities = ['kishiwada','izumi','sakai','izumiotsu','tadaoka','takaishi','kaizuka','kumatori','izumisano','higashiosaka'];
  for(const c of cities) {
    if(base.startsWith(c+'_water')) return c+'_water';
    if(base.startsWith(c+'_drain')) return c+'_drain';
  }
  return null;
}

function makeDisplayName(filename) {
  return filename
    .replace(/\.pdf$/i,'')
    .replace(/^[a-z]+_(water|drain)_/i,'')
    .replace(/-MyComputer|-kazuto|-[a-z0-9]+$/gi,'')
    .replace(/_/g,' ')
    .trim();
}

async function processFiles(fileList) {
  const files = Array.from(fileList).filter(f=>f.name.toLowerCase().endsWith('.pdf'));
  if(!files.length) { alert('PDFファイルを選択してください'); return; }

  const unresolved = []; // グループ不明ファイル
  for(const f of files) {
    const buf = await f.arrayBuffer();
    await idbSave(f.name, buf);
    const group = detectFormGroup(f.name);
    if(group) {
      _addFormToGroup(group, f.name);
    } else {
      unresolved.push(f.name);
    }
  }
  saveState();

  if(unresolved.length) {
    showAssignModal(unresolved);
  } else {
    showView('pdftemplates');
  }
}

function _addFormToGroup(group, filename) {
  if(!state.formsCustom[group]) state.formsCustom[group] = [];
  const allFiles = [...(FORMS_CATALOG[group]?.forms||[]), ...state.formsCustom[group]].map(f=>f.file);
  if(!allFiles.includes(filename)) {
    state.formsCustom[group].push({file:filename, name:makeDisplayName(filename), custom:true});
    // 削除済みリストから取り除く
    state.formsDeleted = state.formsDeleted.filter(f=>f!==filename);
  }
}

function showAssignModal(filenames) {
  const CITY_ORDER = ['kishiwada','izumi','sakai','izumiotsu','tadaoka','takaishi','kaizuka','kumatori','izumisano','higashiosaka'];
  const CITY_NAMES = {kishiwada:'岸和田市',izumi:'和泉市',sakai:'堺市',izumiotsu:'泉大津市',tadaoka:'忠岡町',takaishi:'高石市',kaizuka:'貝塚市',kumatori:'熊取町',izumisano:'泉佐野市',higashiosaka:'東大阪市'};
  const opts = CITY_ORDER.flatMap(c=>[
    `<option value="${c}_water">${CITY_NAMES[c]} 給水</option>`,
    `<option value="${c}_drain">${CITY_NAMES[c]} 排水</option>`
  ]).join('');

  document.getElementById('modal-content').innerHTML = `
  <div class="space-y-4">
    <h2 class="text-lg font-bold text-gray-800">📂 書式の振り分け</h2>
    <p class="text-sm text-gray-500">ファイル名から市・種別を自動判定できませんでした。追加先を選んでください。</p>
    <div class="space-y-3 max-h-72 overflow-y-auto">
      ${filenames.map((fname,i)=>`
      <div class="border border-gray-200 rounded-lg p-3">
        <div class="text-xs font-mono text-gray-600 mb-2 truncate" title="${fname}">${fname}</div>
        <div class="flex gap-2">
          <input id="assign_name_${i}" class="border rounded px-2 py-1 text-xs flex-1" value="${makeDisplayName(fname)}" placeholder="表示名">
          <select id="assign_group_${i}" class="border rounded px-2 py-1 text-xs">${opts}</select>
        </div>
      </div>`).join('')}
    </div>
    <div class="flex justify-end gap-3 pt-2 border-t">
      <button onclick="closeModal()" class="border rounded-lg px-4 py-2 text-sm text-gray-600 hover:bg-gray-50">キャンセル</button>
      <button onclick="saveAssignedForms(${JSON.stringify(filenames)})" class="bg-emerald-600 text-white rounded-lg px-5 py-2 text-sm hover:bg-emerald-700 font-medium">追加する</button>
    </div>
  </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

function saveAssignedForms(filenames) {
  filenames.forEach((fname, i) => {
    const name = document.getElementById(`assign_name_${i}`)?.value.trim() || makeDisplayName(fname);
    const group = document.getElementById(`assign_group_${i}`)?.value;
    if(!group) return;
    if(!state.formsCustom[group]) state.formsCustom[group] = [];
    const allFiles = [...(FORMS_CATALOG[group]?.forms||[]), ...state.formsCustom[group]].map(f=>f.file);
    if(!allFiles.includes(fname)) {
      state.formsCustom[group].push({file:fname, name, custom:true});
      state.formsDeleted = state.formsDeleted.filter(f=>f!==fname);
    }
  });
  saveState();
  closeModal();
  showView('pdftemplates');
}

// ドラッグ&ドロップイベントハンドラ
function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='copy'; document.getElementById('drop-zone').classList.add('border-emerald-400','bg-emerald-50'); }
function handleDragLeave()  { document.getElementById('drop-zone').classList.remove('border-emerald-400','bg-emerald-50'); }
function handleDrop(e)      { e.preventDefault(); handleDragLeave(); processFiles(e.dataTransfer.files); }
function handleFileInput(input) { if(input.files.length) processFiles(input.files); input.value=''; }

function renderPdfTemplates() {
  const filterCity = window._fltrCity || '';
  const filterSect = window._fltrSect || '';
  const searchQ = (window._fltrQ || '').toLowerCase();
  const editMode = window._formsEditMode || false;

  const CITY_ORDER = ['kishiwada','izumi','sakai','izumiotsu','tadaoka','takaishi','kaizuka','kumatori','izumisano','higashiosaka'];
  const CITY_NAMES = {kishiwada:'岸和田市',izumi:'和泉市',sakai:'堺市',izumiotsu:'泉大津市',tadaoka:'忠岡町',takaishi:'高石市',kaizuka:'貝塚市',kumatori:'熊取町',izumisano:'泉佐野市',higashiosaka:'東大阪市'};

  // 全書式のキーセット（FORMS_CATALOG + カスタム追加）
  const allKeys = new Set([...Object.keys(FORMS_CATALOG)]);
  Object.keys(state.formsCustom).forEach(k => { if(state.formsCustom[k]?.length) allKeys.add(k); });

  let entries = [];
  for (const key of allKeys) {
    const base = FORMS_CATALOG[key] || {};
    const cityEn = base.cityEn || key.split('_')[0];
    const sect = base.sect || (key.includes('drain') ? 'drain' : 'water');
    const cityJp = base.cityJp || CITY_NAMES[cityEn] || cityEn;
    if (filterCity && cityEn !== filterCity) continue;
    if (filterSect && sect !== filterSect) continue;
    const effectiveForms = getEffectiveForms(key);
    const forms = searchQ ? effectiveForms.filter(f=>f.name.toLowerCase().includes(searchQ)) : effectiveForms;
    if (forms.length || editMode) entries.push({key, cityJp, cityEn, sect, forms});
  }
  entries.sort((a,b)=>{
    const ai=CITY_ORDER.indexOf(a.cityEn), bi=CITY_ORDER.indexOf(b.cityEn);
    if(ai!==bi) return (ai<0?99:ai)-(bi<0?99:bi);
    return a.sect==='water' ? -1 : 1;
  });

  const totalForms = entries.reduce((n,e)=>n+e.forms.length, 0);
  const cityOptions = CITY_ORDER.map(ce=>`<option value="${ce}" ${filterCity===ce?'selected':''}>${CITY_NAMES[ce]||ce}</option>`).join('');

  return `
  <div class="space-y-5">
    <div class="bg-gradient-to-r from-blue-700 to-blue-600 text-white rounded-xl p-5">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 class="text-lg font-bold">📂 PDF書式管理</h2>
          <p class="text-blue-200 text-sm mt-0.5">市区町村別の申請書式PDFを管理・印刷</p>
        </div>
        <div class="flex items-center gap-2">
          <div class="bg-white/20 text-white text-sm px-3 py-1.5 rounded-lg">${totalForms}件</div>
          <button onclick="window._formsEditMode=!window._formsEditMode;showView('pdftemplates')"
            class="text-sm px-3 py-1.5 rounded-lg font-medium ${editMode ? 'bg-red-500 text-white' : 'bg-white/20 text-white hover:bg-white/30'}">
            ${editMode ? '✅ 編集完了' : '✏️ 編集モード'}
          </button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-4 flex flex-wrap gap-3 items-center">
      <input type="text" placeholder="書式名で検索..." value="${window._fltrQ||''}" oninput="window._fltrQ=this.value;showView('pdftemplates')" class="border rounded-lg px-3 py-2 text-sm flex-1 min-w-40">
      <select onchange="window._fltrCity=this.value;showView('pdftemplates')" class="border rounded-lg px-3 py-2 text-sm">
        <option value="">全市区町村</option>
        ${cityOptions}
      </select>
      <select onchange="window._fltrSect=this.value;showView('pdftemplates')" class="border rounded-lg px-3 py-2 text-sm">
        <option value="">給水・排水すべて</option>
        <option value="water" ${filterSect==='water'?'selected':''}>💧 給水</option>
        <option value="drain" ${filterSect==='drain'?'selected':''}>🏚 排水</option>
      </select>
      <button onclick="window._fltrCity='';window._fltrSect='';window._fltrQ='';showView('pdftemplates')" class="text-gray-500 text-sm hover:text-red-500">リセット</button>
    </div>

    ${editMode ? `
    <div id="drop-zone"
      ondragover="handleDragOver(event)" ondragleave="handleDragLeave()" ondrop="handleDrop(event)"
      class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center transition-colors cursor-pointer bg-white"
      onclick="document.getElementById('form-file-input').click()">
      <div class="text-4xl mb-3">📄</div>
      <div class="font-bold text-gray-700 mb-1">PDFをここにドロップ</div>
      <div class="text-sm text-gray-500 mb-4">または</div>
      <div class="flex justify-center gap-3">
        <button onclick="event.stopPropagation();document.getElementById('form-file-input').click()"
          class="bg-emerald-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-emerald-700 font-medium">
          📁 ファイルを選択（複数可）
        </button>
        <button onclick="event.stopPropagation();document.getElementById('form-folder-input').click()"
          class="bg-blue-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-blue-700 font-medium">
          🗂 フォルダごと選択
        </button>
      </div>
      <p class="text-xs text-gray-400 mt-4">PDF形式のみ対応。ファイル名の先頭が「kumatori_water_…」「kaizuka_drain_…」などの形式であれば自動で振り分けます。</p>
      ${state.formsDeleted.length > 0 ? `<p class="mt-2 text-xs text-red-500 font-medium">⚠️ 現在${state.formsDeleted.length}件を非表示中（設定から復元可能）</p>` : ''}
    </div>
    ` : ''}

    ${FORMS_UNSYNCED.length>0 && !editMode ?`
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-900">
      <strong>⚠️ OneDriveで未同期の市区町村</strong> —
      <span class="font-medium">${FORMS_UNSYNCED.join('、')}</span>
      は書式未変換です。OneDriveで「常にこのデバイスに保存」を設定してください。
    </div>
    `:''}

    <div class="space-y-4">
      ${entries.length === 0 ? '<div class="text-center text-gray-400 py-12">一致する書式がありません</div>' :
      entries.map(g=>{
        const sectLabel = g.sect==='water' ? '💧 給水' : '🏚 排水';
        const sectColor = g.sect==='water' ? 'blue' : 'amber';
        return `
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="flex items-center gap-3 px-5 py-3 bg-${sectColor}-50 border-b border-${sectColor}-100">
            <span class="font-bold text-${sectColor}-800">${g.cityJp}</span>
            <span class="text-sm text-${sectColor}-600 font-medium">${sectLabel}</span>
            <span class="ml-auto text-xs text-${sectColor}-500">${g.forms.length}件</span>
            ${editMode ? `<button onclick="document.getElementById('form-file-input').dataset.group='${g.key}';document.getElementById('form-file-input').click()" class="ml-2 text-xs bg-emerald-600 text-white px-2 py-1 rounded hover:bg-emerald-700">＋ 追加</button>` : ''}
          </div>
          <div class="p-4">
            ${g.forms.length === 0 ? `<p class="text-xs text-gray-400 text-center py-2">書式がありません</p>` : `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
              ${g.forms.map(f=>`
              <div class="flex items-center gap-2 border ${f.custom?'border-emerald-300 bg-emerald-50':'border-gray-200'} rounded-lg px-3 py-2 hover:border-${sectColor}-300 transition group">
                ${f.custom ? '<span class="text-emerald-600 text-xs flex-shrink-0" title="カスタム追加">★</span>' : ''}
                <span class="text-xs text-gray-700 flex-1 leading-tight">${f.name}</span>
                ${editMode
                  ? `<button onclick="deleteForm('${f.file.replace(/'/g,"\\'")}');event.stopPropagation()" title="非表示にする"
                      class="text-red-500 hover:text-red-700 text-xs px-1.5 py-0.5 rounded hover:bg-red-100 flex-shrink-0 font-bold">✕</button>`
                  : `<button onclick="openForm('${f.file.replace(/'/g,"\\'")}',event)" title="PDFを開く"
                      class="text-${sectColor}-600 hover:text-${sectColor}-800 text-xs px-2 py-1 rounded hover:bg-${sectColor}-100 flex-shrink-0">📄 開く</button>`
                }
              </div>`).join('')}
            </div>`}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm text-gray-600">
      <strong>💡 使い方</strong>：「📄 開く」でPDFを新規タブに表示 → ブラウザの印刷（Ctrl+P）で印刷。
      書式の追加は右上「✏️ 編集モード」→ ドロップゾーンにPDFをドラッグ、またはボタンでファイル・フォルダを選択。削除は各書式の「✕」ボタン。
    </div>
  </div>`;
}

// ============================================================
// INIT
// ============================================================
loadState();
document.getElementById('company-name-header').textContent = state.settings.companyName||'会社名未設定';
showView('dashboard');
</script>
<!-- 書式追加用ファイル入力（非表示） -->
<input type="file" id="form-file-input" multiple accept=".pdf" class="hidden"
  onchange="(function(el){
    const group=el.dataset.group;
    if(group){
      // 特定グループへの追加
      Array.from(el.files).filter(f=>f.name.toLowerCase().endsWith('.pdf')).forEach(async f=>{
        const buf=await f.arrayBuffer(); await idbSave(f.name,buf); _addFormToGroup(group,f.name); saveState();
      });
      el.dataset.group=''; showView('pdftemplates');
    } else {
      processFiles(el.files);
    }
    el.value='';
  })(this)">
<input type="file" id="form-folder-input" multiple accept=".pdf" webkitdirectory class="hidden"
  onchange="processFiles(this.files);this.value=''">
</body>
